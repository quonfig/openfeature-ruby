name: Release Gem
on:
  push:
    branches: [main]

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  check-version:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version-changed: ${{ steps.check.outputs.changed }}
      current-version: ${{ steps.check.outputs.current-version }}
    steps:
      - uses: actions/checkout@v4
      - name: Check if version needs publishing
        id: check
        run: |
          current_version=$(ruby -Ilib -rquonfig/openfeature/version -e 'puts Quonfig::OpenFeature::VERSION')
          echo "current-version=$current_version" >> $GITHUB_OUTPUT
          if curl -sfI "https://rubygems.org/api/v2/rubygems/quonfig-openfeature/versions/${current_version}.json" >/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  release:
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.version-changed == 'true'
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false
      - name: Build and push gem via trusted publishing
        uses: rubygems/release-gem@v1
        with:
          await-release: true
