name: Release Gem
on:
  push:
    branches: [main]

jobs:
  wait-for-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wait for quonfig on RubyGems
        run: |
          # Read the floor version from the gemspec's runtime quonfig dep.
          # Avoids loading the gemspec (which requires a ruby setup) by
          # parsing the dependency line directly. Matches both
          # `add_dependency` and `add_runtime_dependency` (Bundler aliases
          # the two; the gemspec currently uses `add_dependency`).
          required=$(grep -E "add_(runtime_)?dependency.*['\"]quonfig['\"]" quonfig-openfeature.gemspec \
            | sed -E "s/.*,[[:space:]]*['\"][>=<^~ ]*([0-9.]+)['\"].*/\1/")
          if [ -z "$required" ]; then
            echo "Could not determine required quonfig version from gemspec" >&2
            exit 1
          fi
          echo "Waiting for quonfig $required on RubyGems..."
          for i in $(seq 1 60); do
            if curl -sfI "https://rubygems.org/api/v2/rubygems/quonfig/versions/${required}.json" >/dev/null; then
              echo "Found quonfig $required after ${i} polls"
              exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for quonfig $required after 10 minutes" >&2
          exit 1

  test:
    needs: wait-for-sdk
    uses: ./.github/workflows/ci.yml

  check-version:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version-changed: ${{ steps.check.outputs.changed }}
      current-version: ${{ steps.check.outputs.current-version }}
    steps:
      - uses: actions/checkout@v4
      - name: Check if version needs publishing
        id: check
        run: |
          current_version=$(ruby -Ilib -rquonfig/openfeature/version -e 'puts Quonfig::OpenFeature::VERSION')
          echo "current-version=$current_version" >> $GITHUB_OUTPUT
          if curl -sfI "https://rubygems.org/api/v2/rubygems/quonfig-openfeature/versions/${current_version}.json" >/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  release:
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.version-changed == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      # We deliberately skip `bundle install` here. The Gemfile has a path:
      # dev dependency on the sibling sdk-ruby checkout (used by tests) which
      # isn't present in the release job. `gem build` only reads the gemspec,
      # so we go directly through gem.
      - name: Configure trusted publisher credentials
        uses: rubygems/configure-rubygems-credentials@main

      - name: Build gem
        run: gem build quonfig-openfeature.gemspec

      - name: Push gem
        run: gem push quonfig-openfeature-${{ needs.check-version.outputs.current-version }}.gem
